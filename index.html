<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Rainbow Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        
        body {
            background-color: #050505;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }
        canvas {
            background-color: #000;
            border: 4px solid #fff; /* Verrà sovrascritto dal JS */
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            cursor: none;
        }
        .hud {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 { 
            margin: 0; 
            font-size: 2.5em;
            letter-spacing: 8px;
            background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div class="hud">
        <h1>RAINBOW PONG</h1>
        <div id="lvl" style="color: #aaa; margin-top: 5px;">LIVELLO 1</div>
    </div>
    
    <canvas id="pong" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        const lvlDisplay = document.getElementById("lvl");

        let hue = 0; // Variabile per il ciclo dei colori
        let scoreTotal = 0;

        const user = { x: 10, y: 150, width: 12, height: 90, score: 0 };
        const com = { x: canvas.width - 22, y: 150, width: 12, height: 90, score: 0 };
        const ball = { x: canvas.width / 2, y: canvas.height / 2, radius: 10, vX: 5, vY: 5, speed: 7 };

        // Funzione per ottenere il colore arcobaleno corrente
        function getRainbowColor(h) {
            return `hsl(${h}, 100%, 60%)`;
        }

        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            ctx.fillRect(x, y, w, h);
            ctx.shadowBlur = 0;
        }

        function drawArc(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.shadowBlur = 25;
            ctx.shadowColor = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, false);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        canvas.addEventListener("mousemove", (e) => {
            let r = canvas.getBoundingClientRect();
            user.y = e.clientY - r.top - user.height / 2;
        });

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.vX = (ball.vX > 0 ? -1 : 1) * ball.speed;
            ball.vY = 5 * (Math.random() > 0.5 ? 1 : -1);
        }

        function collision(b, p) {
            return b.x + b.radius > p.x && b.y + b.radius > p.y && 
                   b.x - b.radius < p.x + p.width && b.y - b.radius < p.y + p.height;
        }

        function update() {
            // Incremento ciclo arcobaleno
            hue = (hue + 2) % 360;
            canvas.style.borderColor = getRainbowColor(hue);

            if (ball.x < 0) { com.score++; scoreTotal++; resetBall(); }
            else if (ball.x > canvas.width) { user.score++; scoreTotal++; resetBall(); }

            ball.x += ball.vX;
            ball.y += ball.vY;

            // Difficoltà aumenta ogni 2 punti
            let level = Math.floor(scoreTotal / 2) + 1;
            lvlDisplay.innerText = "LIVELLO " + level;
            let aiSpeed = 0.05 + (level * 0.015);

            com.y += (ball.y - (com.y + com.height / 2)) * Math.min(aiSpeed, 0.18);

            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.vY = -ball.vY;
            }

            let player = (ball.x < canvas.width / 2) ? user : com;

            if (collision(ball, player)) {
                let cp = (ball.y - (player.y + player.height / 2)) / (player.height / 2);
                let angle = (Math.PI / 4) * cp;
                let dir = (ball.x < canvas.width / 2) ? 1 : -1;
                
                ball.vX = dir * ball.speed * Math.cos(angle);
                ball.vY = ball.speed * Math.sin(angle);
                ball.speed += 0.2;
            }
        }

        function render() {
            // Effetto "Motion Blur" (scia): non puliamo completamente lo schermo
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Rete dinamica
            for (let i = 0; i <= canvas.height; i += 30) {
                drawRect((canvas.width - 2) / 2, i, 2, 15, "rgba(255,255,255,0.2)");
            }

            // Punteggi
            ctx.fillStyle = "white";
            ctx.font = "60px Orbitron";
            ctx.fillText(user.score, canvas.width / 4, canvas.height / 5);
            ctx.fillText(com.score, 3 * canvas.width / 4, canvas.height / 5);

            // Elementi Arcobaleno
            let colorStr = getRainbowColor(hue);
            let colorStrInv = getRainbowColor((hue + 180) % 360); // Colore opposto

            drawRect(user.x, user.y, user.width, user.height, colorStr);
            drawRect(com.x, com.y, com.width, com.height, colorStrInv);
            drawArc(ball.x, ball.y, ball.radius, "#fff"); // Palla bianca per contrasto o colorStr per full RGB
        }

        setInterval(() => { update(); render(); }, 1000 / 50);
    </script>
</body>
</html>
