<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Pong - Chroma Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: rainbowText 5s infinite linear;
        }

        @keyframes rainbowText {
            0% { color: #ff0000; }
            20% { color: #ffff00; }
            40% { color: #00ff00; }
            60% { color: #00ffff; }
            80% { color: #0000ff; }
            100% { color: #ff00ff; }
        }

        canvas {
            background-color: #000;
            border: 5px solid #fff;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            cursor: none;
        }

        #lvl {
            font-size: 1.2rem;
            margin-top: 10px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>CHROMA PONG</h1>
        <div id="lvl">STADIO: 1</div>
    </div>
    
    <canvas id="pong" width="800" height="450"></canvas>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        const lvlTxt = document.getElementById("lvl");

        let hue = 0;
        let scoreCount = 0;

        const user = { x: 10, y: 175, w: 15, h: 100, score: 0, color: "#fff" };
        const com = { x: canvas.width - 25, y: 175, w: 15, h: 100, score: 0, color: "#fff" };
        const ball = { x: canvas.width / 2, y: canvas.height / 2, r: 10, sp: 7, vx: 5, vy: 5 };

        // Gestione mouse
        canvas.addEventListener("mousemove", e => {
            let b = canvas.getBoundingClientRect();
            user.y = e.clientY - b.top - user.h / 2;
        });

        function drawRect(x, y, w, h, color, glow) {
            ctx.fillStyle = color;
            if (glow) {
                ctx.shadowBlur = 25;
                ctx.shadowColor = color;
            }
            ctx.fillRect(x, y, w, h);
            ctx.shadowBlur = 0;
        }

        function drawBall(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.shadowBlur = 30;
            ctx.shadowColor = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function reset() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.vx = -ball.vx;
            ball.sp = 7 + (Math.floor(scoreCount / 2));
        }

        function update() {
            hue = (hue + 1.5) % 360;
            let rainbow = `hsl(${hue}, 100%, 60%)`;
            let rainbowInv = `hsl(${(hue + 180) % 360}, 100%, 60%)`;
            
            canvas.style.borderColor = rainbow;
            user.color = rainbow;
            com.color = rainbowInv;

            ball.x += ball.vx;
            ball.y += ball.vy;

            // AI Logic
            let aiSkill = 0.05 + (Math.min(scoreCount * 0.01, 0.15));
            com.y += (ball.y - (com.y + com.h / 2)) * aiSkill;

            // Bordi
            if (ball.y + ball.r > canvas.height || ball.y - ball.r < 0) {
                ball.vy = -ball.vy;
            }

            // Punti
            if (ball.x < 0) { com.score++; scoreCount++; reset(); }
            if (ball.x > canvas.width) { user.score++; scoreCount++; reset(); }

            // Collisioni
            let p = (ball.x < canvas.width / 2) ? user : com;
            if (ball.x + ball.r > p.x && ball.x - ball.r < p.x + p.w && ball.y + ball.r > p.y && ball.y - ball.r < p.y + p.h) {
                let collidePoint = (ball.y - (p.y + p.h / 2)) / (p.h / 2);
                let angle = (Math.PI / 4) * collidePoint;
                let dir = (ball.x < canvas.width / 2) ? 1 : -1;
                ball.vx = dir * ball.sp * Math.cos(angle);
                ball.vy = ball.sp * Math.sin(angle);
                ball.sp += 0.3;
            }

            lvlTxt.innerText = "STADIO: " + (Math.floor(scoreCount / 2) + 1);
        }

        function render() {
            // Motion Blur
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Rete
            for (let i = 0; i < canvas.height; i += 40) {
                drawRect(canvas.width / 2 - 1, i, 2, 20, "rgba(255,255,255,0.1)", false);
            }

            // Testi
            ctx.fillStyle = "#fff";
            ctx.font = "60px Orbitron";
            ctx.textAlign = "center";
            ctx.fillText(user.score, canvas.width / 4, 80);
            ctx.fillText(com.score, 3 * canvas.width / 4, 80);

            // Racchette e Palla
            drawRect(user.x, user.y, user.w, user.h, user.color, true);
            drawRect(com.x, com.y, com.w, com.h, com.color, true);
            drawBall(ball.x, ball.y, ball.r, "#fff");
        }

        setInterval(() => { update(); render(); }, 1000 / 60);
    </script>
</body>
</html>
