<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Classico - Liceo Classico Edition</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        canvas {
            background-color: #000;
            border: 5px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            cursor: none; /* Nasconde il mouse sopra il gioco */
        }
        h1 { margin: 10px 0; letter-spacing: 5px; }
        .info { color: #888; margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>PONG</h1>
    <canvas id="pong" width="800" height="400"></canvas>
    <div class="info">Muovi il mouse per giocare. La sfida ha inizio!</div>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        // Parametri Utente
        const user = {
            x: 0,
            y: (canvas.height - 100) / 2,
            width: 10,
            height: 100,
            score: 0,
            color: "WHITE"
        };

        // Parametri Computer
        const com = {
            x: canvas.width - 10,
            y: (canvas.height - 100) / 2,
            width: 10,
            height: 100,
            score: 0,
            color: "WHITE"
        };

        // Parametri Palla
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            velocityX: 5,
            velocityY: 5,
            speed: 7,
            color: "WHITE"
        };

        // Rete
        const net = {
            x: (canvas.width - 2) / 2,
            y: 0,
            pWidth: 2,
            pHeight: 10,
            color: "WHITE"
        };

        // Funzioni di disegno
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawArc(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, true);
            ctx.closePath();
            ctx.fill();
        }

        function drawNet() {
            for (let i = 0; i <= canvas.height; i += 15) {
                drawRect(net.x, net.y + i, net.pWidth, net.pHeight, net.color);
            }
        }

        function drawText(text, x, y) {
            ctx.fillStyle = "#FFF";
            ctx.font = "75px Arial";
            ctx.fillText(text, x, y);
        }

        // Movimento racchetta con mouse
        canvas.addEventListener("mousemove", (evt) => {
            let rect = canvas.getBoundingClientRect();
            user.y = evt.clientY - rect.top - user.height / 2;
        });

        // Collisione
        function collision(b, p) {
            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.radius;

            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;

            return b.right > p.left && b.bottom > p.top && b.left < p.right && b.top < p.bottom;
        }

        // Reset palla
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = -ball.velocityX;
            ball.speed = 7;
        }

        // Logica di aggiornamento
        function update() {
            // Punteggio
            if (ball.x - ball.radius < 0) {
                com.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                user.score++;
                resetBall();
            }

            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // AI Computer
            com.y += (ball.y - (com.y + com.height / 2)) * 0.1;

            // Rimbalzo pareti
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.velocityY = -ball.velocityY;
            }

            // Controllo racchetta colpita
            let player = (ball.x < canvas.width / 2) ? user : com;

            if (collision(ball, player)) {
                // Dove la palla colpisce la racchetta
                let collidePoint = (ball.y - (player.y + player.height / 2));
                collidePoint = collidePoint / (player.height / 2);

                // Angolo di rimbalzo (max 45 gradi)
                let angleRad = (Math.PI / 4) * collidePoint;

                // Cambio direzione X
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;
                ball.velocityX = direction * ball.speed * Math.cos(angleRad);
                ball.velocityY = ball.speed * Math.sin(angleRad);

                // Aumenta velocità ad ogni colpo
                ball.speed += 0.1;
            }
        }

        // Rendering grafico
        function render() {
            drawRect(0, 0, canvas.width, canvas.height, "#000"); // Sfondo
            drawNet();
            drawText(user.score, canvas.width / 4, canvas.height / 5);
            drawText(com.score, 3 * canvas.width / 4, canvas.height / 5);
            drawRect(user.x, user.y, user.width, user.height, user.color);
            drawRect(com.x, com.y, com.width, com.height, com.color);
            drawArc(ball.x, ball.y, ball.radius, ball.color);
        }

        function game() {
            update();
            render();
        }

        const framePerSecond = 50;
        setInterval(game, 1000 / framePerSecond);
    </script>
</body>
</html>
