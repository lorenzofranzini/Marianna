<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Personalizzato - Liceo Classico</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        
        body {
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 20px;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        canvas {
            background-color: #000;
            border: 4px solid #fff;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            cursor: none;
        }

        .stats {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #ffc0cb; /* Rosa */
        }
    </style>
</head>
<body>

    <h1>PONG CUSTOM</h1>
    <canvas id="pong" width="800" height="400"></canvas>
    <div class="stats" id="status">LIVELLO: 1</div>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");
        const statusTxt = document.getElementById("status");

        let scoreTotal = 0;

        // Definizione Oggetti
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speed: 7,
            velocityX: 5,
            velocityY: 5,
            color: "#FF69B4" // Rosa Shocking
        };

        const user = {
            x: 10,
            y: 150,
            width: 15,
            height: 100,
            score: 0,
            color: "#FF0000" // Rosso
        };

        const com = {
            x: canvas.width - 25,
            y: 150,
            width: 15,
            height: 100,
            score: 0,
            color: "#0000FF" // Blu
        };

        // Input Mouse
        canvas.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            user.y = e.clientY - rect.top - user.height / 2;
        });

        // Funzioni di Disegno
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawBall(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        function drawNet() {
            for (let i = 0; i <= canvas.height; i += 15) {
                drawRect(canvas.width / 2 - 1, i, 2, 10, "#333");
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = -ball.velocityX;
            ball.speed = 7 + Math.floor(scoreTotal / 2); // Aumenta con i punti
        }

        function collision(b, p) {
            return b.x + b.radius > p.x && b.y + b.radius > p.y && 
                   b.x - b.radius < p.x + p.width && b.y - b.radius < p.y + p.height;
        }

        // Logica di Gioco
        function update() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // AI Computer
            let aiEase = 0.06 + (Math.min(scoreTotal * 0.01, 0.1)); 
            com.y += (ball.y - (com.y + com.height / 2)) * aiEase;

            // Rimbalzo Pareti
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.velocityY = -ball.velocityY;
            }

            // Punti
            if (ball.x < 0) {
                com.score++;
                scoreTotal++;
                resetBall();
            } else if (ball.x > canvas.width) {
                user.score++;
                scoreTotal++;
                resetBall();
            }

            // Collisioni Racchette
            let player = (ball.x < canvas.width / 2) ? user : com;

            if (collision(ball, player)) {
                let collidePoint = (ball.y - (player.y + player.height / 2)) / (player.height / 2);
                let angleRad = (Math.PI / 4) * collidePoint;
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;

                ball.velocityX = direction * ball.speed * Math.cos(angleRad);
                ball.velocityY = ball.speed * Math.sin(angleRad);
                ball.speed += 0.2;
            }

            statusTxt.innerText = "LIVELLO: " + (Math.floor(scoreTotal / 3) + 1);
        }

        // Rendering
        function render() {
            drawRect(0, 0, canvas.width, canvas.height, "#000"); // Pulisci
            drawNet();

            // Punteggi
            ctx.fillStyle = "#fff";
            ctx.font = "45px Orbitron";
            ctx.fillText(user.score, canvas.width / 4, canvas.height / 5);
            ctx.fillText(com.score, 3 * canvas.width / 4, canvas.height / 5);

            // Elementi colorati
            drawRect(user.x, user.y, user.width, user.height, user.color);
            drawRect(com.x, com.y, com.width, com.height, com.color);
            drawBall(ball.x, ball.y, ball.radius, ball.color);
        }

        function game() {
            update();
            render();
        }

        setInterval(game, 1000 / 60);
    </script>
</body>
</html>
