<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Classico - Studente Liceo</title>
    <style>
        body {
            background-color: #222;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            background-color: #000;
        }
        h1 { margin-bottom: 10px; }
        .instruzioni { margin-top: 15px; color: #aaa; }
    </style>
</head>
<body>

    <h1>PONG JS</h1>
    <canvas id="pongCanvas" width="800" height="400"></canvas>
    <div class="instruzioni">Usa il mouse o il touch per muovere la tua racchetta (sinistra)</div>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");

        // Oggetti del gioco
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speedX: 5,
            speedY: 5,
            color: "WHITE"
        };

        const user = {
            x: 0,
            y: canvas.height / 2 - 50,
            width: 10,
            height: 100,
            score: 0,
            color: "WHITE"
        };

        const com = {
            x: canvas.width - 10,
            y: canvas.height / 2 - 50,
            width: 10,
            height: 100,
            score: 0,
            color: "WHITE"
        };

        const net = {
            x: (canvas.width - 2) / 2,
            y: 0,
            height: 10,
            width: 2,
            color: "WHITE"
        };

        // Disegno delle funzioni
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawArc(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, true);
            ctx.closePath();
            ctx.fill();
        }

        function drawNet() {
            for (let i = 0; i <= canvas.height; i += 15) {
                drawRect(net.x, net.y + i, net.width, net.height, net.color);
            }
        }

        function drawText(text, x, y) {
            ctx.fillStyle = "#FFF";
            ctx.font = "45px Arial";
            ctx.fillText(text, x, y);
        }

        // Controllo racchetta utente
        canvas.addEventListener("mousemove", getMousePos);
        function getMousePos(evt) {
            let rect = canvas.getBoundingClientRect();
            user.y = evt.clientY - rect.top - user.height / 2;
        }

        // Rilevamento collisioni
        function collision(b, p) {
            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;

            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.width;

            return p.left < b.right && p.top < b.bottom && p.right > b.left && p.bottom > b.top;
        }

        // Reset della palla
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX = -ball.speedX;
            ball.speedY = 5;
        }

        // Update della logica
        function update() {
            // Movimento palla
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // AI semplice per il computer
            com.y += (ball.y - (com.y + com.height / 2)) * 0.1;

            // Rimbalzo bordi sopra/sotto
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.speedY = -ball.speedY;
            }

            // Controllo chi ha colpito la palla
            let player = (ball.x + ball.radius < canvas.width / 2) ? user : com;

            if (collision(ball, player)) {
                // Calcolo angolo di rimbalzo
                let collidePoint = (ball.y - (player.y + player.height / 2));
                collidePoint = collidePoint / (player.height / 2);
                let angleRad = (Math.PI / 4) * collidePoint;

                let direction = (ball.x + ball.radius < canvas.width / 2) ? 1 : -1;
                ball.speedX = direction * Math.abs(Math.cos(angleRad) * 7);
                ball.speedY = Math.sin(angleRad) * 7;
            }

            // Punteggio
            if (ball.x - ball.radius < 0) {
                com.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                user.score++;
                resetBall();
            }
        }

        // Funzione di rendering
        function render() {
            drawRect(0, 0, canvas.width, canvas.height, "#000");
            drawNet();
            drawText(user.score, canvas.width / 4, canvas.height / 5);
            drawText(com.score, 3 * canvas.width / 4, canvas.height / 5);
            drawRect(user.x, user.y, user.width, user.height, user.color);
            drawRect(com.x, com.y, com.width, com.height, com.color);
            drawArc(ball.x, ball.y, ball.radius, ball.color);
        }

        function game() {
            update();
            render();
        }

        // Loop a 50 frame al secondo
        let framePerSecond = 50;
        setInterval(game, 1000 / framePerSecond);
    </script>
</body>
</html>
