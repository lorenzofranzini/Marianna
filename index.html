<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Rounded - Rosso Blu Rosa</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* Applichiamo il carattere Rounded ovunque */
            font-family: 'Varela Round', sans-serif;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5rem;
            letter-spacing: -1px;
            color: #ff69b4; /* Rosa */
            text-shadow: 2px 2px 0px #fff;
        }

        canvas {
            background-color: #000;
            /* Bordi arrotondati anche per il campo da gioco */
            border: 6px solid #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: none;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            width: 800px;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .user-score { color: #ff4d4d; } /* Rosso */
        .com-score { color: #4d4dff; }  /* Blu */
    </style>
</head>
<body>

    <h1>ROUNDED PONG</h1>
    
    <div class="score-board">
        <div id="userScore" class="user-score">0</div>
        <div id="comScore" class="com-score">0</div>
    </div>

    <canvas id="pong" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        // Parametri Gioco
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 12, // Leggermente più grande per sembrare più "morbida"
            speed: 7,
            vx: 5,
            vy: 5,
            color: "#FF69B4" // ROSA
        };

        const user = {
            x: 15,
            y: 150,
            w: 15,
            h: 90,
            score: 0,
            color: "#FF4D4D" // ROSSO
        };

        const com = {
            x: canvas.width - 30,
            y: 150,
            w: 15,
            h: 90,
            score: 0,
            color: "#4D4DFF" // BLU
        };

        // Funzione per disegnare rettangoli arrotondati
        function drawRoundedRect(x, y, w, h, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
            ctx.fill();
        }

        function drawBall(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
        }

        canvas.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            user.y = e.clientY - rect.top - user.h / 2;
        });

        function reset() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.vx = -ball.vx;
            ball.speed = 7;
        }

        function update() {
            ball.x += ball.vx;
            ball.y += ball.vy;

            // AI
            com.y += (ball.y - (com.y + com.h / 2)) * 0.08;

            // Bordi
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.vy = -ball.vy;
            }

            // Punteggio
            if (ball.x < 0) {
                com.score++;
                document.getElementById("comScore").innerText = com.score;
                reset();
            } else if (ball.x > canvas.width) {
                user.score++;
                document.getElementById("userScore").innerText = user.score;
                reset();
            }

            // Collisione
            let p = (ball.x < canvas.width / 2) ? user : com;
            if (ball.x + ball.radius > p.x && ball.x - ball.radius < p.x + p.w && ball.y + ball.radius > p.y && ball.y - ball.radius < p.y + p.h) {
                let collidePoint = (ball.y - (p.y + p.h / 2)) / (p.h / 2);
                let angle = (Math.PI / 4) * collidePoint;
                let dir = (ball.x < canvas.width / 2) ? 1 : -1;
                ball.vx = dir * ball.speed * Math.cos(angle);
                ball.vy = ball.speed * Math.sin(angle);
                ball.speed += 0.4;
            }
        }

        function render() {
            // Sfondo pulito
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Rete stilizzata
            for (let i = 10; i < canvas.height; i += 30) {
                drawRoundedRect(canvas.width / 2 - 2, i, 4, 15, 2, "#333");
            }

            // Disegno elementi arrotondati
            drawRoundedRect(user.x, user.y, user.w, user.h, 8, user.color);
            drawRoundedRect(com.x, com.y, com.w, com.h, 8, com.color);
            drawBall(ball.x, ball.y, ball.radius, ball.color);
        }

        setInterval(() => { update(); render(); }, 1000 / 60);
    </script>
</body>
</html>
